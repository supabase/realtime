name: Lint
on:
  pull_request:
    paths:
      - "lib/**"
      - "test/**"
      - "config/**"
      - "priv/**"
      - "assets/**"
      - "rel/**"
      - "mix.exs"
      - "mix.lock"
      - "Dockerfile"
      - "run.sh"
      - "mise.toml"
      - "test/e2e/nix-build.sh"
      - ".github/workflows/**"
      - ".github/actionlint.yaml"

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  POSTGRES_IMAGE: supabase/postgres:17.6.1.074

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup elixir
        id: beam
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        with:
          otp-version: 27.x # Define the OTP version [required]
          elixir-version: 1.18.x # Define the elixir version [required]
      - name: Cache Mix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            deps
            _build
          key: ${{ github.workflow }}-${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ github.workflow }}-${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-

      - name: Install dependencies
        run: mix deps.get
      - name: Check for warnings
        run: mix compile --force --warnings-as-errors
      - name: Run format check
        run: mix format --check-formatted
      - name: Credo checks
        run: mix credo
      - name: Run hex audit
        run: mix hex.audit
      - name: Run mix_audit
        run: mix deps.audit
      - name: Run sobelow
        run: mix sobelow --config .sobelow-conf
      - name: Retrieve PLT Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: plt-cache
        with:
          path: priv/plts
          key: ${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-plts-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
      - name: Create PLTs
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p priv/plts
          mix dialyzer.build
      - name: Run dialyzer
        run: mix dialyzer

  tenant-db-baseline:
    name: Check Tenant DB baseline
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Cache Mix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            deps
            _build
          key: ${{ github.workflow }}-${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ github.workflow }}-${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Cache Docker images
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: docker-cache
        with:
          path: /tmp/docker-images
          key: docker-images-zstd-${{ env.POSTGRES_IMAGE }}
      - name: Load Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: zstd -d --stdout /tmp/docker-images/postgres.tar.zst | docker image load
      - name: Pull and save Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.POSTGRES_IMAGE }}
          mkdir -p /tmp/docker-images
          docker image save ${{ env.POSTGRES_IMAGE }} | zstd -T0 -o /tmp/docker-images/postgres.tar.zst
      - name: Start Postgres
        run: docker compose -f compose.dbs.yml up -d --wait
      - name: Set up realtime DB and migrate tenant DB
        run: mix ecto.setup
      - name: Regenerate baseline snapshot
        run: mix realtime.export_tenant_db_baseline
      - name: Check baseline is up to date
        run: |
          if ! git diff --exit-code priv/repo/tenant_db_baseline.json; then
            echo "::error file=priv/repo/tenant_db_baseline.json::Baseline snapshot is stale. Run 'mix realtime.export_tenant_db_baseline' locally and commit the result."
            exit 1
          fi
          
  actionlint:
    name: Actionlint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.7

  shellcheck:
    name: Shellcheck
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run shellcheck
        run: shellcheck run.sh test/e2e/nix-build.sh
