services:
  test_db:
    image: supabase/postgres:17.6.1.074
    container_name: test-realtime-db
    ports:
      - "5532:5432"
    volumes:
      - ./dev/postgres:/docker-entrypoint-initdb.d/
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  test_realtime:
    depends_on:
      - test_db
    build: .
    container_name: test-realtime-server
    ports:
      - "4100:4100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_JWT_SECRET: dev
      APP_NAME: realtime
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: "1234567890123456"
      PORT: 4100
      DB_HOST: test_db
      DNS_NODES: "''"
      ELIXIR_ERL_OPTIONS: +hmax 1000000000
      ERL_AFLAGS: -proto_dist inet_tcp
      GEN_RPC_TCP_CLIENT_PORT: 5469
      GEN_RPC_TCP_SERVER_PORT: 5369
      METRICS_JWT_SECRET: dev
      NAME: pink
      REGION: us-east-1
      RLIMIT_NOFILE: 1000000
      RUN_JANITOR: "true"
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      SEED_SELF_HOST: "true"
      SLOT_NAME_SUFFIX: some_sha
      DASHBOARD_USER: admin
      DASHBOARD_PASSWORD: admin
    networks:
      test-network:
        aliases:
          - realtime-dev.local
          - realtime-dev.localhost
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Deno test runner
  test-runner:
    image: denoland/deno:alpine-2.5.6
    container_name: deno-test-runner
    depends_on:
      test_realtime:
        condition: service_healthy
      test_db:
        condition: service_healthy
    volumes:
      - ./test/integration/tests.ts:/app/tests.ts:ro
    working_dir: /app
    command: >
      sh -c "
      echo 'Running tests...' &&
      deno test tests.ts --allow-import --no-check --allow-read --allow-net --trace-leaks --allow-env=WS_NO_BUFFER_UTIL
      "
    networks:
      - test-network
    extra_hosts:
      - "realtime-dev.localhost:host-gateway"

networks:
  test-network:
    driver: bridge
